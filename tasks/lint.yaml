includes:
  - common: https://raw.githubusercontent.com/defenseunicorns/uds-common/v1.24.11/tasks/lint.yaml

tasks:
  - name: check
    description: "Run all lint checks via hk against the full tree"
    actions:
      - cmd: hk check --all

  - name: fix
    description: "Apply lint fixes via hk against the full tree"
    actions:
      - cmd: hk fix --all

  - name: license
    description: "Check SPDX license headers"
    actions:
      - task: common:license

  - name: fix-license
    description: "Add SPDX license headers to source files"
    actions:
      - task: common:fix-license
