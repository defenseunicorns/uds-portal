variables:
  - name: VERSION
    description: "reference for the app portal image and zarf package"
    # x-release-please-start-version
    default: 0.1.0
    # x-release-please-end

tasks:
  - name: all
    description: build all the CLI binaries and gen checksums
    actions:
      - task: ui
      - task: api-linux-amd64
      - task: api-linux-arm64
      - task: api-darwin-amd64
      - task: api-darwin-arm64
      - cmd: sha256sum build/* > build/checksums.txt

  - name: api-linux-amd64
    description: "build the go api server for linux amd64 (used for multi-arch container)"
    actions:
      - cmd: CGO_ENABLED=0 GOARCH=amd64 GOOS=linux go build -o build/uds-portal-linux-amd64 .

  - name: api-linux-arm64
    description: "build the go api server for linux arm64 (used for multi-arch container)"
    actions:
      - cmd: CGO_ENABLED=0 GOARCH=arm64 GOOS=linux go build -o build/uds-portal-linux-arm64 .

  - name: api-darwin-amd64
    description: "build the go api server for darwin amd64"
    actions:
      - cmd: CGO_ENABLED=0 GOARCH=amd64 GOOS=darwin go build -o build/uds-portal-darwin-amd64 .

  - name: api-darwin-arm64
    description: "build the go api server for darwin arm64"
    actions:
      - cmd: CGO_ENABLED=0 GOARCH=arm64 GOOS=darwin go build -o build/uds-portal-darwin-arm64 .

  - name: api-linux
    description: "build the go api server for linux and local architecture"
    actions:
      - cmd: CGO_ENABLED=0 GOOS=linux go build -o build/uds-portal-linux-$UDS_ARCH .

  - name: api
    description: "build the go api server for the local platform"
    actions:
      - cmd: CGO_ENABLED=0 go build -o ./build/uds-portal .

  - name: ui
    description: "build ui"
    actions:
      - cmd: pnpm install --frozen-lockfile && pnpm run build
        dir: ui

  - name: container
    description: "build container image (multi-arch push to GHCR when push=true, local single-arch otherwise)"
    inputs:
      push:
        default: "false"
        description: "push multi-arch image to GHCR"
    actions:
      - cmd: go mod tidy
      - task: ui
      - task: api-linux-amd64
      - task: api-linux-arm64
      - cmd: |
          if [ "${{ .inputs.push }}" = "true" ]; then
            docker buildx build --platform linux/amd64,linux/arm64 -t ghcr.io/defenseunicorns/uds-portal:${VERSION} --push .
          else
            docker buildx build --platform linux/${UDS_ARCH} -t ghcr.io/defenseunicorns/uds-portal:${VERSION} --load .
          fi

  - name: zarf-package
    description: "build the uds portal zarf package (both arches when dev=false, local arch when dev=true)"
    inputs:
      dev:
        default: "false"
        description: "build for local arch only (faster local iteration)"
    actions:
      - cmd: |
          if [ "${{ .inputs.dev }}" = "true" ]; then
            uds zarf p create -a ${UDS_ARCH} -o build --confirm --set VERSION=${VERSION}
          else
            uds zarf p create -a amd64 -o build --confirm --set VERSION=${VERSION}
            uds zarf p create -a arm64 -o build --confirm --set VERSION=${VERSION}
          fi
