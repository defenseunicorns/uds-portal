apiVersion: uds.dev/v1alpha1
kind: Package
metadata:
  name: podinfo-multi
  namespace: podinfo-multi
  annotations:
    uds.dev/portal-hide-apps: 'podinfo-multi-hidden'
spec:
  network:
    expose:
      - service: podinfo-multi
        selector:
          app.kubernetes.io/name: podinfo-multi
        gateway: tenant
        host: podinfo-multi
        port: 9898
      - service: podinfo-multi
        selector:
          app.kubernetes.io/name: podinfo-multi
        gateway: tenant
        host: podinfo-multi-hidden
        port: 9898
  sso:
    - name: podinfo-multi
      clientId: podinfo-multi
      attributes:
        access.token.lifespan: '120'
      redirectUris:
        - 'https://podinfo-multi.uds.dev/auth'
      enableAuthserviceSelector:
        app.kubernetes.io/name: podinfo-multi
