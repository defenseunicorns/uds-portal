kind: ZarfPackageConfig
metadata:
  name: podinfo-test
  description: |
    used to load the cluster for e2e testing; using a local zarf.yaml for dev deploy
  version: 0.0.1
  annotations:
    dev.uds.icon: 'data:image/svg+xml;base64,'

variables:
  - name: DOMAIN
    default: 'uds.dev'

components:
  - name: podinfo
    required: true
    manifests:
      - name: uds-cr
        files:
          - uds-package.yaml
    charts:
      - name: podinfo
        version: 6.13.0
        namespace: podinfo
        url: https://github.com/stefanprodan/podinfo.git
        gitPath: charts/podinfo
        valuesFiles:
          - values.yaml
    images:
      - ghcr.io/stefanprodan/podinfo:6.13.0
