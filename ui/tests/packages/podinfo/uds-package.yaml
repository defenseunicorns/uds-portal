apiVersion: uds.dev/v1alpha1
kind: Package
metadata:
  name: podinfo
  namespace: podinfo
spec:
  network:
    expose:
      - service: podinfo
        selector:
          app.kubernetes.io/name: podinfo
        gateway: tenant
        host: podinfo
        port: 9898
  sso:
    - name: podinfo
      clientId: podinfo
      attributes:
        access.token.lifespan: '120'
        client.session.idle.timeout: '3600'
      redirectUris:
        - 'https://podinfo.uds.dev/auth'
      enableAuthserviceSelector:
        app.kubernetes.io/name: podinfo
      groups:
        anyOf:
          - /SHOC-N
