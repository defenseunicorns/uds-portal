name: Lint

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    types: [milestoned, opened, synchronize]

jobs:
  lint-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: lint-check
        uses: ./.github/actions/lint-check
