name: Test

permissions:
  contents: read
  pull-requests: read

on:
  pull_request:
    branches: [main]
    types: [milestoned, opened, synchronize]
    paths-ignore:
      - "**.md"
      - "**.png"
      - "**.jpg"
      - "**.svg"
      - "**.gif"
      - "CODEOWNERS"
      - "LICENSE*"

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-paths:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Check paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            app:
              - 'src/**'
              - 'ui/**'
              - 'main.go'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile'
              - 'chart/**'
              - 'zarf.yaml'
              - 'mise.toml'

  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          # renovate: datasource=github-releases depName=jdx/mise versioning=semver
          version: 2026.7.11
          install: true
          cache: true

      - name: Run unit tests
        run: uds run test:unit

  e2e:
    needs: [check-paths, unit]
    if: needs.unit.result == 'success' && (needs.check-paths.outputs.app == 'true' || !startsWith(github.head_ref, 'renovate/'))
    runs-on: uds-ubuntu-big-boy-4-core
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          # renovate: datasource=github-releases depName=jdx/mise versioning=semver
          version: 2026.7.11
          install: true
          cache: true

      - name: Setup e2e environment
        run: uds run test:e2e-setup

      - name: Run e2e tests
        run: uds run test:e2e
