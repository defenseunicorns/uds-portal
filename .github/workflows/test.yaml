name: Test

permissions:
  contents: read
  pull-requests: read

on:
  pull_request:
    branches: [main]
    types: [milestoned, opened, synchronize]
    paths-ignore:
      - "**.md"
      - "**.png"
      - "**.jpg"
      - "**.svg"
      - "**.gif"
      - "CODEOWNERS"
      - "LICENSE*"

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-paths:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            app:
              - 'src/**'
              - 'ui/**'
              - 'main.go'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile'
              - 'chart/**'
              - 'zarf.yaml'
              - 'mise.toml'

  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          # renovate: datasource=github-releases depName=jdx/mise versioning=semver
          version: 2026.5.18
          install: true
          cache: true

      - name: Run unit tests
        run: uds run test:unit

  e2e:
    needs: [check-paths, unit]
    if: needs.unit.result == 'success' && (needs.check-paths.outputs.app == 'true' || !startsWith(github.head_ref, 'renovate/'))
    runs-on: uds-ubuntu-big-boy-4-core
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          # renovate: datasource=github-releases depName=jdx/mise versioning=semver
          version: 2026.5.18
          install: true
          cache: true

      - name: Setup e2e environment
        run: uds run test:e2e-setup

      - name: Run e2e tests
        run: uds run test:e2e
