name: Docker Image Tests

on:
  pull_request:
    paths:
      - "Dockerfile"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          # renovate: datasource=github-releases depName=jdx/mise versioning=semver
          version: 2026.6.14
          install: true
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to Chainguard
        uses: chainguard-dev/setup-chainctl@2cddd35a2f120d9973e58094dc6878c93cf58c28 # v0.5.1
        with:
          identity: ${{ secrets.CHAINGUARD_IDENTITY }}

      - name: Build docker image
        env:
          VERSION: 0.0.0-dev
        run: |
          uds run build:ui
          uds run build:api-linux-amd64
          uds run build:api-linux-arm64
          docker buildx build --platform linux/amd64,linux/arm64 -t "ghcr.io/defenseunicorns/uds-portal:${VERSION}" .
