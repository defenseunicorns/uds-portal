kind: UDSBundle
metadata:
  name: uds-portal-seed-valkey
  description: Shared Valkey dependency for UDS Portal seed bundles.
  version: dev

packages:
  - name: valkey
    repository: ghcr.io/uds-packages/valkey
    ref: 8.1.3-uds.4-upstream
    overrides:
      valkey:
        uds-valkey-config:
          values:
            - path: additionalNetworkAllow
              value:
                - direction: Ingress
                  selector:
                    app.kubernetes.io/name: valkey
                  remoteNamespace: gitea
                  port: 6379
                  description: "Ingress from Gitea"
                - direction: Ingress
                  selector:
                    app.kubernetes.io/name: valkey
                  remoteNamespace: gitlab
                  port: 6379
                  description: "Ingress from GitLab"
        valkey:
          values:
            - path: auth.enabled
              value: false
