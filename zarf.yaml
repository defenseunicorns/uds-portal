kind: ZarfPackageConfig
metadata:
  name: uds-portal
  description: UDS Portal is the home page for UDS
  version: "###ZARF_PKG_TMPL_VERSION###"

variables:
  - name: DOMAIN
    default: "uds.dev"
  - name: ADMIN_DOMAIN
    description: "Domain for admin services, defaults to admin.${DOMAIN} when empty"
    default: ""
  - name: IMAGE_PULL_POLICY
    description: "Image pull policy for the portal deployment"
    default: IfNotPresent

constants:
  - name: VERSION
    description: "Portal Version"
    value: "###ZARF_PKG_TMPL_VERSION###"

components:
  - name: uds-portal
    required: true
    charts:
      - name: uds-portal
        localPath: chart
        namespace: uds-portal
        version: "###ZARF_PKG_TMPL_VERSION###"
        valuesFiles:
          - values/upstream-values.yaml
        variables:
          - name: IMAGE_PULL_POLICY
            description: "Image pull policy for the portal deployment"
            path: image.pullPolicy
    images:
      - ghcr.io/defenseunicorns/uds-portal:###ZARF_PKG_TMPL_VERSION###
