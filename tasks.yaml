includes:
  - setup: https://raw.githubusercontent.com/defenseunicorns/uds-common/v1.24.5/tasks/setup.yaml
  - test: tasks/test.yaml
  - lint: tasks/lint.yaml
  - build: tasks/build.yaml

variables:
  - name: REF
    description: "reference for the app portal image and zarf package"
    # x-release-please-start-version
    default: 0.1.0
    # x-release-please-end

tasks:
  - name: dev-server
    description: "run the api server in dev mode (requires air https://github.com/air-verse/air?tab=readme-ov-file#installation)"
    actions:
      - cmd: go install github.com/air-verse/air@latest
      - cmd: air -c .air.toml

  - name: dev-ui
    description: "run the ui in dev mode"
    actions:
      - cmd: pnpm install --frozen-lockfile && pnpm run dev
        dir: ui

  - name: compile
    description: "compile the api server and ui outputting to build/"
    actions:
      - task: build:ui
      - task: build:api
