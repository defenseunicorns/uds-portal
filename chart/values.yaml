replicaCount: 1
image:
  repository: ghcr.io/defenseunicorns/uds-app-portal
  # x-release-please-start-version
  tag: 0.1.0
  # x-release-please-end
  pullPolicy: IfNotPresent
sso:
  enabled: true
package:
  gateway: tenant
  host: apps
  domain: "###ZARF_VAR_DOMAIN###"
  adminDomain: "###ZARF_VAR_ADMIN_DOMAIN###"

# Default requests and limits when running only uds-core (increase for production)
resources:
  requests:
    memory: "128Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "750m"

# add user and group for static chainguard image
podSecurityContext:
  runAsUser: 65532
  runAsGroup: 65532
containerSecurityContext:
  runAsUser: 65532
  runAsGroup: 65532

classificationBanner:
  enabled: false
  addFooter: false
  text: ""
