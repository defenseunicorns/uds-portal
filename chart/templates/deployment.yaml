apiVersion: apps/v1
kind: Deployment
metadata:
  name: uds-runtime
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: uds-runtime
  template:
    metadata:
      labels:
        app: uds-runtime
    spec:
      serviceAccountName: uds-runtime-sa
      securityContext:
          {{- .Values.podSecurityContext | toYaml | nindent 8 }}
      containers:
        - name: uds-runtime
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- .Values.containerSecurityContext | toYaml | nindent 12 }}
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory | quote }}
              cpu: {{ .Values.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.resources.limits.memory | quote }}
              cpu: {{ .Values.resources.limits.cpu | quote }}
          env:
            - name: IN_CLUSTER_AUTH_ENABLED
              value: {{ .Values.sso.enabled | quote }}
            - name: CLASSIFICATION_BANNER_ENABLED
              value: {{ .Values.classificationBanner.enabled | quote }}
            - name: CLASSIFICATION_BANNER_TEXT
              value: {{ .Values.classificationBanner.text | quote }}
            - name: CLASSIFICATION_BANNER_FOOTER
              value: {{ .Values.classificationBanner.addFooter | quote }}
          volumeMounts:
            - name: security-hub-db
              mountPath: /data/uds
      initContainers:
        - name: security-hub-db
          image: {{ .Values.security_hub_db.image }}
          imagePullPolicy: {{ .Values.security_hub_db.pullPolicy }}
          command:
            - sh
            - -c
            - cp -R /data/uds/* /shared
          volumeMounts:
            - name: security-hub-db
              mountPath: /shared
      volumes:
        - name: security-hub-db
          emptyDir: {}
