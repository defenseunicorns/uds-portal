kind: ZarfPackageConfig
metadata:
  name: uds-common-app-portal
  description: "UDS Common App Portal"
components:
  - name: uds-runtime
    required: true
    charts:
      - name: uds-app-portal
        localPath: ../../../chart
        namespace: uds-app-portal
        version: 0.1.0
        # Default values are added here so that Zarf templates them before evaluating Helm conditionals
        valuesFiles:
          - ../../../chart/values.yaml
    actions:
      onDeploy:
        after:
          - description: Validate App Portal Package
            maxTotalSeconds: 300
            wait:
              cluster:
                kind: packages.uds.dev
                name: uds-app-portal
                namespace: uds-app-portal
                condition: "'{.status.phase}'=Ready"
