kind: ZarfPackageConfig
metadata:
  name: uds-runtime
  description: nightly release of uds-runtime
  version: nightly-unstable

variables:
  - name: DOMAIN
    default: "uds.dev"

  - name: ADMIN_DOMAIN

components:
  - name: uds-runtime
    required: true
    images:
      - ghcr.io/defenseunicorns/uds-runtime:nightly-unstable
      # renovate: datasource=docker depName=ghcr.io/defenseunicorns/uds-security-hub versioning=loose
      - ghcr.io/defenseunicorns/uds-security-hub:v2.2.0-20250107.0413
    charts:
      - name: uds-runtime
        localPath: ../../chart
        namespace: uds-runtime
        version: 0.1.0
        valuesFiles:
          # Default values are added here so that Zarf templates them before evaluating Helm conditionals
          - ../../chart/values.yaml
          - nightly-values.yaml
