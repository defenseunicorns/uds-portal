kind: ZarfPackageConfig
metadata:
  name: uds-app-portal
  version: test

variables:
  - name: DOMAIN
    default: "uds.dev"

  - name: ADMIN_DOMAIN

components:
  - name: uds-app-portal
    required: true
    description: smoke test of nightly release of uds-app-portal
    images:
      - uds-app-portal:test # local copy of uds-app-portal
    charts:
      - name: uds-app-portal
        localPath: ../../chart
        namespace: uds-app-portal
        version: 0.1.0
        valuesFiles:
          # Default values are added here so that Zarf templates them before evaluating Helm conditionals
          - ../../chart/values.yaml
          - values.yaml
    actions:
      onDeploy:
        after:
          - description: Validate Runtime Package
            maxTotalSeconds: 300
            wait:
              cluster:
                kind: packages.uds.dev
                name: uds-app-portal
                namespace: uds-app-portal
                condition: "'{.status.phase}'=Ready"
